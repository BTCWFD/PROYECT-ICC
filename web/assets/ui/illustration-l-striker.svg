<?xml version="1.0" encoding="UTF-8"?>
<!-- ICC · Ilustracion: Robot L-Striker (delantero robotico estilizado) -->
<svg xmlns="http://www.w3.org/2000/svg" width="240" height="320" viewBox="0 0 240 320"
     role="img" aria-label="Robot L-Striker, delantero robotico de futbol lunar">
  <defs>
    <linearGradient id="lsBody" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#eef3ff"/>
      <stop offset="100%" stop-color="#aebbd9"/>
    </linearGradient>
    <linearGradient id="lsAccent" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#7fa6ff"/>
      <stop offset="100%" stop-color="#3a63d6"/>
    </linearGradient>
    <radialGradient id="lsVisor" cx="40%" cy="35%" r="70%">
      <stop offset="0%" stop-color="#9ec2ff"/>
      <stop offset="100%" stop-color="#1b3a8c"/>
    </radialGradient>
  </defs>
  <!-- Sombra -->
  <ellipse cx="120" cy="300" rx="70" ry="14" fill="#000" opacity=".3"/>
  <!-- Piernas -->
  <rect x="96" y="220" width="18" height="60" rx="8" fill="url(#lsBody)" stroke="#1b2a55" stroke-width="2"/>
  <rect x="126" y="220" width="18" height="50" rx="8" fill="url(#lsBody)" stroke="#1b2a55" stroke-width="2"/>
  <!-- Pie de pateo -->
  <path d="M126 264 q-4 14 14 16 h16 q4 -8 -4 -12 z" fill="url(#lsAccent)" stroke="#1b2a55" stroke-width="2" stroke-linejoin="round"/>
  <path d="M88 274 q-4 8 6 12 h22 v-6 H100 q-6 0 -6 -8 z" fill="#aebbd9" stroke="#1b2a55" stroke-width="2" stroke-linejoin="round"/>
  <!-- Torso -->
  <rect x="84" y="138" width="72" height="88" rx="18" fill="url(#lsBody)" stroke="#1b2a55" stroke-width="2.5"/>
  <!-- Placa de pecho con "L" -->
  <rect x="100" y="156" width="40" height="46" rx="8" fill="#0e1730" stroke="#5b8cff" stroke-width="2"/>
  <path d="M114 166 v24 h16" fill="none" stroke="#ffd35b" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Franja dorada -->
  <rect x="84" y="210" width="72" height="8" fill="#ffd35b" opacity=".85"/>
  <!-- Brazos -->
  <rect x="60" y="146" width="18" height="60" rx="9" fill="url(#lsBody)" stroke="#1b2a55" stroke-width="2" transform="rotate(-12 69 176)"/>
  <rect x="162" y="146" width="18" height="58" rx="9" fill="url(#lsBody)" stroke="#1b2a55" stroke-width="2" transform="rotate(16 171 175)"/>
  <circle cx="58" cy="204" r="8" fill="url(#lsAccent)" stroke="#1b2a55" stroke-width="2"/>
  <circle cx="186" cy="200" r="8" fill="url(#lsAccent)" stroke="#1b2a55" stroke-width="2"/>
  <!-- Cuello -->
  <rect x="110" y="124" width="20" height="18" fill="#9aa6c0" stroke="#1b2a55" stroke-width="2"/>
  <!-- Cabeza / casco -->
  <rect x="92" y="74" width="56" height="56" rx="20" fill="url(#lsBody)" stroke="#1b2a55" stroke-width="2.5"/>
  <!-- Visor -->
  <rect x="100" y="90" width="40" height="24" rx="12" fill="url(#lsVisor)" stroke="#1b2a55" stroke-width="2"/>
  <circle cx="112" cy="102" r="3.4" fill="#ffd35b"/>
  <circle cx="128" cy="102" r="3.4" fill="#ffd35b"/>
  <!-- Antena -->
  <line x1="120" y1="74" x2="120" y2="58" stroke="#1b2a55" stroke-width="3" stroke-linecap="round"/>
  <circle cx="120" cy="54" r="5" fill="#ffd35b" stroke="#8a661d" stroke-width="1"/>
  <!-- Balon junto al pie -->
  <circle cx="180" cy="284" r="16" fill="#eef3ff" stroke="#1b2a55" stroke-width="2"/>
  <path d="M180 274 l6 5 -2 7 -8 0 -2 -7 z" fill="#1b2a55"/>
</svg>
