<?xml version="1.0" encoding="UTF-8"?>
<!-- ICC · Emblema de Rango 5: Leyenda Lunar (maximo) -->
<svg xmlns="http://www.w3.org/2000/svg" width="96" height="96" viewBox="0 0 96 96"
     role="img" aria-label="Emblema de rango Leyenda Lunar">
  <defs>
    <radialGradient id="r5Bg" cx="50%" cy="38%" r="68%">
      <stop offset="0%" stop-color="#2a3a6b"/>
      <stop offset="100%" stop-color="#05070f"/>
    </radialGradient>
    <linearGradient id="r5Gold" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#fff2c4"/>
      <stop offset="50%" stop-color="#ffd35b"/>
      <stop offset="100%" stop-color="#d99a2c"/>
    </linearGradient>
    <radialGradient id="r5Moon" cx="38%" cy="36%" r="72%">
      <stop offset="0%" stop-color="#f4f6fc"/>
      <stop offset="100%" stop-color="#9aa4c2"/>
    </radialGradient>
  </defs>
  <!-- Resplandor exterior -->
  <circle cx="48" cy="48" r="46" fill="none" stroke="url(#r5Gold)" stroke-width="2" opacity=".4"/>
  <circle cx="48" cy="48" r="44" fill="url(#r5Bg)" stroke="url(#r5Gold)" stroke-width="4"/>
  <!-- Rayos -->
  <g stroke="url(#r5Gold)" stroke-width="2" stroke-linecap="round" opacity=".7">
    <line x1="48" y1="6" x2="48" y2="13"/>
    <line x1="48" y1="83" x2="48" y2="90"/>
    <line x1="6" y1="48" x2="13" y2="48"/>
    <line x1="83" y1="48" x2="90" y2="48"/>
    <line x1="18" y1="18" x2="23" y2="23"/>
    <line x1="78" y1="18" x2="73" y2="23"/>
    <line x1="18" y1="78" x2="23" y2="73"/>
    <line x1="78" y1="78" x2="73" y2="73"/>
  </g>
  <!-- Luna emblematica -->
  <circle cx="48" cy="44" r="16" fill="url(#r5Moon)" stroke="#1b2a55" stroke-width="1.2"/>
  <circle cx="42" cy="40" r="3" fill="#9aa4c2" opacity=".7"/>
  <circle cx="53" cy="46" r="2.2" fill="#9aa4c2" opacity=".7"/>
  <circle cx="46" cy="50" r="1.6" fill="#9aa4c2" opacity=".6"/>
  <!-- Estrella coronando -->
  <path d="M48 24 l2.4 5 5.4 .5 -4 3.6 1.2 5.3 -5 -2.9 -5 2.9 1.2 -5.3 -4 -3.6 5.4 -.5 z"
