  <text x="48" y="76" text-anchor="middle" fill="#ffe08a" font-size="8.5" font-weight="800"
        font-family="system-ui, 'Segoe UI', Roboto, Arial, sans-serif" letter-spacing="1.5">LEYENDA LUNAR</text>
</svg>
