<?xml version="1.0" encoding="UTF-8"?>
<!-- ICC · Ilustracion: Balon sobre el regolito lunar con la Tierra al fondo -->
<svg xmlns="http://www.w3.org/2000/svg" width="320" height="240" viewBox="0 0 320 240"
     role="img" aria-label="Balon de futbol sobre el regolito lunar con la Tierra al fondo">
  <defs>
    <radialGradient id="brSky" cx="50%" cy="30%" r="90%">
      <stop offset="0%" stop-color="#0a1226"/>
      <stop offset="60%" stop-color="#05080f"/>
      <stop offset="100%" stop-color="#02030a"/>
    </radialGradient>
    <radialGradient id="brEarth" cx="38%" cy="36%" r="75%">
      <stop offset="0%" stop-color="#7fc2ff"/>
      <stop offset="40%" stop-color="#2f7fe6"/>
      <stop offset="75%" stop-color="#143e8c"/>
      <stop offset="100%" stop-color="#04122e"/>
    </radialGradient>
    <linearGradient id="brRego" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#3a3d4a"/>
      <stop offset="100%" stop-color="#0c0d12"/>
    </linearGradient>
    <radialGradient id="brBall" cx="38%" cy="34%" r="72%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="70%" stop-color="#dfe5f2"/>
      <stop offset="100%" stop-color="#9aa6c0"/>
    </radialGradient>
    <clipPath id="brBallClip"><circle cx="160" cy="150" r="44"/></clipPath>
  </defs>
  <rect width="320" height="240" fill="url(#brSky)"/>
  <!-- Estrellas -->
  <g fill="#fff">
    <circle cx="40" cy="40" r="1.6" opacity=".8"/>
    <circle cx="90" cy="24" r="1.1" opacity=".6"/>
    <circle cx="150" cy="50" r="1.4" opacity=".7"/>
    <circle cx="280" cy="36" r="1.8" opacity=".9"/>
    <circle cx="240" cy="70" r="1.2" opacity=".6"/>
    <circle cx="20" cy="100" r="1.3" opacity=".6"/>
    <circle cx="300" cy="110" r="1.4" opacity=".7"/>
  </g>
  <!-- Tierra -->
  <g>
    <circle cx="250" cy="64" r="42" fill="url(#brEarth)" stroke="#0b2350" stroke-width="1"/>
    <g fill="#2f6f4e" opacity=".55">
      <path d="M232 50 q12 -7 22 -2 q6 8 -2 14 q-12 5 -24 -2 q-3 -7 4 -10 z"/>
      <path d="M256 78 q9 -3 16 4 q3 8 -6 11 q-11 2 -15 -6 q-1 -7 5 -9 z"/>
    </g>
    <ellipse cx="240" cy="54" rx="16" ry="5" fill="#dfeaff" opacity=".22"/>
  </g>
  <!-- Regolito -->
  <path d="M0 180 Q80 162 160 174 T320 168 L320 240 L0 240 Z" fill="url(#brRego)"/>
  <ellipse cx="70" cy="210" rx="34" ry="10" fill="#15171f"/>
  <ellipse cx="70" cy="207" rx="34" ry="10" fill="none" stroke="#4a4e5d" stroke-width="1.5" opacity=".5"/>
  <ellipse cx="250" cy="222" rx="46" ry="12" fill="#101218"/>
  <!-- Sombra del balon -->
  <ellipse cx="160" cy="196" rx="40" ry="10" fill="#000" opacity=".4"/>
  <!-- Balon -->
  <circle cx="160" cy="150" r="44" fill="url(#brBall)" stroke="#11151f" stroke-width="2"/>
  <g clip-path="url(#brBallClip)" stroke="#11151f" stroke-width="2.4" stroke-linejoin="round">
    <polygon points="160,136 174,146 169,162 151,162 146,146" fill="#161a24"/>
    <polygon points="142,118 156,114 165,126 158,140 144,138" fill="#161a24"/>
    <polygon points="178,118 192,128 190,142 176,142 170,128" fill="#161a24"/>
    <polygon points="132,170 148,178 145,192 130,192 124,178" fill="#161a24"/>
    <polygon points="188,172 200,182 195,196 180,194 178,178" fill="#161a24"/>
    <g stroke="#aeb6cc" stroke-width="1.8" fill="none" opacity=".7">
      <line x1="146" y1="146" x2="126" y2="136"/>
      <line x1="174" y1="146" x2="194" y2="136"/>
      <line x1="151" y1="162" x2="138" y2="178"/>
      <line x1="169" y1="162" x2="182" y2="178"/>
    </g>
  </g>
  <ellipse cx="146" cy="138" rx="12" ry="8" fill="#fff" opacity=".5"/>
</svg>
